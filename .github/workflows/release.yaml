name: Release

on:
  push:
    branches:
      - main
      tags:
        - v*.*.*
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write 

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false


jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build native addon (optional)
        run: node-gyp rebuild && npm run sync:native
        continue-on-error: true

      - name: Check native bindings (informational)
        run: |
          if [ -f ./build/Release/bigint_buffer.node ]; then
            echo "Native addon present — will be included in publish."
          else
            echo "Native addon absent — publishing pure-JS build (fallback will be used at runtime)."
          fi

      - name: Run unit tests
        run: npm run test

      - name: prepublish
        run: npm run prepublishOnly

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release